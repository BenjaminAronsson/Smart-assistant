# cargo-deny — supply-chain gate (docs/02 §3, docs/03 §2, CI Security stage docs/03 §6).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Reviewed as part of the SBOM gate (docs/03 §2). Extend deliberately, never wildcard.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The purity rule (CLAUDE.md invariant 3) is enforced structurally by
# `cargo xtask arch-test`; cargo-deny gates licenses/advisories/sources.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
