<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis — frosted glass HUD, all states</title>
<style>
  :root{
    --c-idle: 210 90% 58%;
    --c-listen: 172 70% 45%;
    --c-think: 258 75% 62%;
    --c-tool: 205 85% 55%;
    --c-approve: 34 92% 55%;
    --c-success: 152 55% 42%;
    --c-error: 358 75% 58%;
    --c-degraded: 220 10% 55%;
    --hue: var(--c-idle);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: clamp(20px, 4vmin, 40px);
    font-family: -apple-system, "Segoe UI", Inter, sans-serif;
    background:
      radial-gradient(circle at 20% 15%, hsl(var(--hue) / .16), transparent 45%),
      radial-gradient(circle at 82% 78%, hsl(200 80% 70% / .14), transparent 45%),
      linear-gradient(180deg, #f4f6f9 0%, #eceff3 100%);
    overflow:hidden;
    transition: background 1.1s ease;
    padding: clamp(16px, 4vmin, 40px);
  }

  /* ---------- ambient life: drifting soft particles, always present ---------- */
  .field{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .mote{
    position:absolute; border-radius:50%;
    background: radial-gradient(circle, hsl(var(--hue) / .5), transparent 70%);
    filter: blur(1px);
    animation: drift linear infinite;
    transition: background 1.1s ease;
  }
  @keyframes drift{
    0%   { transform: translateY(0) translateX(0) scale(1); opacity:0; }
    8%   { opacity:.55; }
    92%  { opacity:.35; }
    100% { transform: translateY(-38vmin) translateX(var(--dx,4vmin)) scale(1.4); opacity:0; }
  }

  /* ---------- the orb: everything scales off vmin, never px ---------- */
  .stage{ position:relative; z-index:1; width: min(60vmin, 420px); aspect-ratio:1; display:flex; align-items:center; justify-content:center; }

  .ring{
    position:absolute; inset:0; border-radius:50%;
    border: max(1px, .3vmin) solid hsl(var(--hue) / .3);
    transition: border-color 1.1s ease, opacity .6s ease, inset .5s ease;
  }
  .ring.r1{ animation: spin 22s linear infinite; }
  .ring.r2{ inset:9%; border-style:dashed; border-color:hsl(var(--hue) / .22); animation: spin 30s linear infinite reverse; }
  .ring.r3{ inset:18%; box-shadow: 0 0 4vmin 0 hsl(var(--hue) / .35); animation: breathe 3.4s ease-in-out infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes breathe{ 0%,100%{ opacity:.55; transform:scale(1);} 50%{ opacity:1; transform:scale(1.045);} }

  .glass-core{
    position:absolute; inset:26%; border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, hsl(0 0% 100% / .9), hsl(var(--hue) / .18) 55%, hsl(var(--hue) / .06) 78%);
    backdrop-filter: blur(1.2vmin);
    border: 1px solid hsl(0 0% 100% / .7);
    box-shadow:
      0 1vmin 3vmin -0.5vmin hsl(var(--hue) / .35),
      inset 0 0 2vmin hsl(0 0% 100% / .6);
    transition: background 1.1s ease, box-shadow 1.1s ease;
    animation: breathe 3.4s ease-in-out infinite;
  }

  /* progress arc for tool-running */
  .arc{ position:absolute; inset:2%; border-radius:50%; opacity:0; transition:opacity .4s ease; }
  .arc svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .arc circle{ fill:none; stroke:hsl(var(--hue) / .8); stroke-width: 1.6%; stroke-linecap:round;
    stroke-dasharray: 300; stroke-dashoffset: 300; }
  .state-tool .arc{ opacity:1; }
  .state-tool .arc circle{ animation: sweep 1.6s ease-in-out infinite; }
  @keyframes sweep{ 0%{ stroke-dashoffset:300; } 50%{ stroke-dashoffset:70; } 100%{ stroke-dashoffset:300; } }

  /* waveform bars for listening */
  .waveform{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:.9vmin; opacity:0; transition:opacity .3s ease; }
  .state-listen .waveform{ opacity:1; }
  .waveform span{ width: 1vmin; min-width:3px; border-radius: 2vmin; background: hsl(var(--hue) / .8);
    animation: bar 900ms ease-in-out infinite; }
  .waveform span:nth-child(1){ height:14%; animation-delay:0ms; }
  .waveform span:nth-child(2){ height:34%; animation-delay:90ms; }
  .waveform span:nth-child(3){ height:54%; animation-delay:180ms; }
  .waveform span:nth-child(4){ height:38%; animation-delay:270ms; }
  .waveform span:nth-child(5){ height:22%; animation-delay:360ms; }
  @keyframes bar{ 0%,100%{ transform:scaleY(.45); } 50%{ transform:scaleY(1); } }

  /* orbiting spark for thinking/streaming */
  .spark{ position:absolute; width: 2.6%; height:2.6%; border-radius:50%; background:hsl(var(--hue) / .9);
    box-shadow:0 0 1.4vmin hsl(var(--hue) / .8); top:50%; left:50%; opacity:0; transition:opacity .3s ease; }
  .state-think .spark{ opacity:1; animation: orbit 1.1s linear infinite; }
  .state-think .spark.s2{ animation-duration:1.7s; animation-direction:reverse; }
  @keyframes orbit{ from{ transform: rotate(0deg) translateX(28vmin) rotate(0deg) scale(.4);} to{ transform: rotate(360deg) translateX(28vmin) rotate(-360deg) scale(.4);} }
  .state-think .stage{ --orbit-r: 1; }

  /* approval: countdown ring + amber urgency pulse */
  .state-approve .ring.r3{ animation: urgentpulse 1.4s ease-in-out infinite; }
  @keyframes urgentpulse{ 0%,100%{ opacity:.6; } 50%{ opacity:1; box-shadow:0 0 5vmin hsl(var(--hue)/.55);} }

  /* success: one confident bloom */
  .state-success .glass-core{ animation: bloom 700ms cubic-bezier(.2,1.4,.4,1) 1; }
  @keyframes bloom{ 0%{ transform:scale(1);} 40%{ transform:scale(1.14);} 100%{ transform:scale(1);} }

  /* error: sharp shake, then settle */
  .state-error .stage{ animation: shake 480ms ease-in-out 1; }
  @keyframes shake{ 0%,100%{ transform:translateX(0);} 20%{ transform:translateX(-1.4%);} 40%{ transform:translateX(1.2%);} 60%{ transform:translateX(-.8%);} 80%{ transform:translateX(.6%);} }

  /* degraded: dim, slow, dashed */
  .state-degraded .ring{ animation-duration: 60s; opacity:.4; }
  .state-degraded .glass-core{ filter: saturate(.5); animation-duration: 5.5s; }

  /* icon per state, center of core */
  .icon{ position:relative; z-index:2; width: 34%; height:34%; display:flex; align-items:center; justify-content:center; color:hsl(var(--hue) / .9); transition: color 1.1s ease; }
  .icon svg{ width:100%; height:100%; }

  /* ---------- status glass panel, fluid width ---------- */
  .panel{
    position:relative; z-index:1;
    width:min(92vw, 460px);
    padding: clamp(12px,2.4vmin,18px) clamp(16px,3vmin,22px);
    border-radius: clamp(14px, 2.4vmin, 20px);
    background: hsl(0 0% 100% / .55);
    backdrop-filter: blur(1.4vmin) saturate(1.4);
    border: 1px solid hsl(0 0% 100% / .8);
    box-shadow: 0 1vmin 3vmin -1vmin hsl(220 30% 30% / .18);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .panel .label{ font-size:clamp(12px,1.6vmin,15px); font-weight:600; color:#20242b; }
  .panel .desc{ font-size:clamp(10.5px,1.35vmin,12.5px); color:#6b7280; margin-top:2px; }
  .panel .chip{
    font-size:clamp(9.5px,1.2vmin,11px); font-weight:600; letter-spacing:.02em;
    padding: .45em .8em; border-radius:2em; white-space:nowrap;
    background: hsl(var(--hue) / .14); color: hsl(var(--hue) / 1);
    transition: background 1.1s ease, color 1.1s ease;
  }

  /* ---------- state picker, fluid wrap ---------- */
  .picker{ position:relative; z-index:1; display:flex; flex-wrap:wrap; gap: clamp(6px,1vmin,10px); justify-content:center; max-width:min(94vw,560px); }
  .picker button{
    font: inherit; font-size:clamp(11px,1.3vmin,12.5px); font-weight:600;
    padding: .5em 1em; border-radius:2em; cursor:pointer;
    border:1px solid hsl(0 0% 0% / .08); background: hsl(0 0% 100% / .7); color:#3a3f47;
    backdrop-filter: blur(.6vmin);
    transition: transform .15s ease, background .2s ease;
  }
  .picker button:hover{ transform: translateY(-1px); }
  .picker button.active{ background:#20242b; color:#fff; border-color:#20242b; }

  .autotag{ position: relative; z-index:1; font-size:clamp(10px,1.2vmin,11.5px); color:#8b93a0; }
</style>
</head>
<body class="state-idle" id="body">

<div class="field" id="field"></div>

<div class="stage" id="stage">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="glass-core"></div>
  <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="spark s1"></div>
  <div class="spark s2"></div>
  <div class="arc"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46"/></svg></div>
  <div class="icon" id="icon"></div>
</div>

<div class="panel">
  <div>
    <div class="label" id="label">Idle</div>
    <div class="desc" id="desc">Nothing running. Say the word, or type.</div>
  </div>
  <div class="chip" id="chip">ready</div>
</div>

<div class="picker" id="picker"></div>
<div class="autotag" id="autotag">auto-cycling demo — click any state to pin it</div>

<script>
const states = [
  { key:'idle',     hue:'var(--c-idle)',     label:'Idle',              desc:'Nothing running. Say the word, or type.',        chip:'ready',
    icon:'<circle cx="12" cy="12" r="3.4" fill="currentColor"/>' },
  { key:'listen',    hue:'var(--c-listen)',   label:'Listening',         desc:'Push-to-talk held — capturing audio.',           chip:'mic live',
    icon:'' },
  { key:'think',     hue:'var(--c-think)',    label:'Thinking',         desc:'Claude is reasoning — streaming a response.',    chip:'claude · ok',
    icon:'' },
  { key:'tool',      hue:'var(--c-tool)',     label:'Running a tool',    desc:'Executing read_file within an approved scope.',  chip:'R0 · auto',
    icon:'<path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l1 1 5.3-5.3a4 4 0 0 1 5.4-5.4l-2.2 2.2 1.2 1.2 2.2-2.2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>' },
  { key:'approve',   hue:'var(--c-approve)',  label:'Waiting on you',    desc:'send_message → landlord@… — approve or deny.',   chip:'R2 · 0:58',
    icon:'<path d="M12 3v10m0 0l-3.5-3.5M12 13l3.5-3.5M5 16v3a2 2 0 002 2h10a2 2 0 002-2v-3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' },
  { key:'success',   hue:'var(--c-success)',  label:'Done',              desc:'Message sent. Logged to the run timeline.',      chip:'completed',
    icon:'<path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' },
  { key:'error',     hue:'var(--c-error)',    label:'Tool failed',       desc:'Timed out after 30s. The action did not run.',   chip:'error · TOOL_TIMEOUT',
    icon:'<path d="M12 8v5m0 3.2h.01M12 3l9 16H3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' },
  { key:'degraded',  hue:'var(--c-degraded)', label:'Degraded',          desc:'Quota exhausted — queued. Resets in 12m.',       chip:'offline · queued',
    icon:'<path d="M4 4l16 16M8 8a6 6 0 0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>' },
];

const body = document.getElementById('body');
const label = document.getElementById('label');
const desc = document.getElementById('desc');
const chip = document.getElementById('chip');
const icon = document.getElementById('icon');
const picker = document.getElementById('picker');
const field = document.getElementById('field');
const autotag = document.getElementById('autotag');

let pinned = false;
let idx = 0;

function apply(s){
  body.className = 'state-' + s.key;
  body.style.setProperty('--hue', s.hue);
  label.textContent = s.label;
  desc.textContent = s.desc;
  chip.textContent = s.chip;
  icon.innerHTML = '<svg viewBox="0 0 24 24">' + s.icon + '</svg>';
  [...picker.children].forEach(b => b.classList.toggle('active', b.dataset.key === s.key));
}

states.forEach((s,i) => {
  const b = document.createElement('button');
  b.textContent = s.label;
  b.dataset.key = s.key;
  b.onclick = () => { pinned = true; idx = i; apply(s); autotag.textContent = 'pinned — click another to switch'; };
  picker.appendChild(b);
});

apply(states[0]);

setInterval(() => {
  if (pinned) return;
  idx = (idx + 1) % states.length;
  apply(states[idx]);
}, 2600);

// ambient particles — resolution independent, driven by vmin via inline custom props
function spawnMote(){
  const m = document.createElement('div');
  m.className = 'mote';
  const size = 0.6 + Math.random()*1.6; // vmin
  m.style.width = size + 'vmin';
  m.style.height = size + 'vmin';
  m.style.left = (Math.random()*100) + 'vw';
  m.style.bottom = (-4 - Math.random()*6) + 'vmin';
  m.style.setProperty('--dx', (Math.random()*8 - 4) + 'vmin');
  m.style.animationDuration = (9 + Math.random()*10) + 's';
  field.appendChild(m);
  setTimeout(() => m.remove(), 20000);
}
setInterval(spawnMote, 700);
for(let i=0;i<10;i++) setTimeout(spawnMote, i*180);
</script>
</body>
</html>
